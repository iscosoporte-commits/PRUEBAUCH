<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Virtual 360°</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: sans-serif; }
    #panorama { width: 100vw; height: 100vh; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      padding: 16px 24px; color: white;
    }
    #header h1 { font-size: 1.1rem; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }

    #coords {
      position: fixed; bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 10px 16px; font-family: monospace; font-size: 15px;
      z-index: 999; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    }

    /* POPUP LATERAL */
    #info-panel {
      display: none;
      position: fixed; top: 50%; left: 20px;
      transform: translateY(-50%);
      width: 280px;
      background: rgba(20,20,20,0.88);
      color: white; border-radius: 12px;
      padding: 20px; z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }
    #info-panel h3 { font-size: 0.95rem; margin-bottom: 10px; color: #f0c040; }
    #info-panel p  { font-size: 0.82rem; line-height: 1.6; color: #ddd; }
    #info-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; color: white;
      font-size: 18px; cursor: pointer;
    }

    /* HOTSPOT PERSONALIZADO */
    .custom-hotspot {
      width: 36px; height: 36px;
      background: rgba(240,192,64,0.85);
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }
    .custom-hotspot:hover { transform: scale(1.2); }
  </style>
</head>
<audio id="audio-guia" autoplay loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- Botón para silenciar -->
<button onclick="
  var a = document.getElementById('audio-guia');
  a.muted = !a.muted;
  this.innerText = a.muted ? '🔇' : '🔊';
" style="position:fixed;bottom:20px;right:20px;z-index:999;
font-size:22px;background:rgba(0,0,0,0.6);border:none;
color:white;padding:8px 12px;border-radius:8px;cursor:pointer;">🔊</button>
<body>

<div id="header"><h1>Tour Virtual 360°</h1></div>
<div id="panorama"></div>
<div id="coords">Yaw: — | Pitch: —</div>

<!-- POPUP LATERAL -->
<div id="info-panel">
  <button id="info-close" onclick="document.getElementById('info-panel').style.display='none'">✕</button>
  <h3 id="info-title"></h3>
  <p id="info-text"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script>
  function mostrarInfo(titulo, texto) {
    document.getElementById('info-title').innerText = titulo;
    document.getElementById('info-text').innerText = texto;
    document.getElementById('info-panel').style.display = 'block';
  }

  function crearHotspotInfo(hotSpotDiv, args) {
    hotSpotDiv.classList.add('custom-hotspot');
    hotSpotDiv.innerHTML = 'ℹ';
    hotSpotDiv.onclick = () => mostrarInfo(args.titulo, args.texto);
  }

  window._v = pannellum.viewer('panorama', {
    default: { firstScene: 'sala1' },
    scenes: {
      'sala1': {
        type: 'equirectangular',
        panorama: 'imagen1.jpg',
        autoLoad: true,
        autoRotate: -2,
        hotSpots: [
          {
            pitch: -10, yaw: 121.0,
            type: 'scene', sceneId: 'sala2',
            text: 'Ir a Sala 2'
          },
          {
            pitch: 0, yaw: 0,
            type: 'custom',
            cssClass: 'custom-hotspot',
            createTooltipFunc: crearHotspotInfo,
            createTooltipArgs: {
              titulo: 'Compañía Unión Chalaca N°1',
              texto: 'Fundada en 1860, es una de las compañías de bomberos más antiguas del Perú, ubicada en el Callao.'
            }
          }
        ]
      },
      'sala2': {
        type: 'equirectangular',
        panorama: 'imagen2.jpg',
        autoLoad: true,
        hotSpots: [
          {
            pitch: -10, yaw: -90,
            type: 'scene', sceneId: 'sala1',
            text: 'Volver a Sala 1'
          }
        ]
      }
    }
  });

  setInterval(() => {
    document.getElementById('coords').innerText =
      'Yaw: ' + window._v.getYaw().toFixed(1) + '  |  Pitch: ' + window._v.getPitch().toFixed(1);
  }, 200);
</script>
</body>
</html>
