<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Virtual 360°</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: sans-serif; }
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      padding: 16px 24px; color: white;
    }
    #header h1 { font-size: 1.1rem; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
    #panorama { width: 100vw; height: 100vh; }
    #coords {
      position: fixed; bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 10px 16px; font-family: monospace; font-size: 15px;
      z-index: 999; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div id="header">
  <h1>Tour Virtual 360°</h1>
</div>

<div id="panorama"></div>

<div id="coords">Yaw: — | Pitch: —</div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script>
  window._v = pannellum.viewer('panorama', {
    default: { firstScene: 'sala1' },
    scenes: {
      'sala1': {
        type: 'equirectangular',
        panorama: 'imagen3.jpg',
        autoLoad: true,
        autoRotate: -2,
        hotSpots: [
          {
            pitch: -10.4,
            yaw: 114.8,
            type: 'scene',
            sceneId: 'sala2',
            text: 'Ir a Sala 2'
          }
        ]
      },
      'sala2': {
        type: 'equirectangular',
        panorama: 'imagen4.jpg',
        autoLoad: true,
        hotSpots: [
          {
            pitch: -6.8,
            yaw: 115.4,
            type: 'scene',
            sceneId: 'sala1',
            text: 'Volver a Sala 1'
          }
        ]
      }
    }
  });

  setInterval(() => {
    document.getElementById('coords').innerText =
      'Yaw: ' + window._v.getYaw().toFixed(1) + '  |  Pitch: ' + window._v.getPitch().toFixed(1);
  }, 200);
</script>

</body>
</html>
